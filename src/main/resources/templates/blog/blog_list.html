<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="normal/base::Layout(~{::section})">

<body>

<section class="container mt-4">

    <!-- Page Title -->
	<div class="text-center mb-4">
	    <h2 class="text-white">📝 All Blogs</h2>
	    <p class="text-white">Explore all your published blogs</p>
	</div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(posts)}"
         class="alert alert-info text-center">
        No blogs available yet. Start writing one!
    </div>

    <!-- Blog Cards -->
    <div class="row" th:if="${!#lists.isEmpty(posts)}">

        <div class="col-md-6 col-lg-4 mb-4"
             th:each="post : ${posts}">

            <div class="card h-100 shadow-sm">

                <div class="card-body">

                    <!-- Title -->
                    <h5 class="card-title"
                        th:text="${post.title}">
                    </h5>

                    <!-- Category + Date -->
                    <p class="text-muted small mb-2">

                        <!-- SAFE CATEGORY -->
                        <span class="badge badge-primary"
                              th:text="${post.category != null ? post.category.categoryTitle : 'No Category'}">
                        </span>

                        |

                        <!-- SAFE DATE -->
                        <span th:text="${post.addedDate != null ? #dates.format(post.addedDate,'dd MMM yyyy') : 'N/A'}">
                        </span>

                    </p>

                    <!-- Content Preview -->
                    <p class="card-text"
                       th:text="${#strings.abbreviate(post.content, 120)}">
                    </p>

                </div>

                <!-- Footer -->
                <div class="card-footer bg-white border-0 d-flex justify-content-between">

                    <!-- Read More (optional future) -->
					<a th:href="@{'/user/blog/' + ${post.postId}}"
					   class="btn btn-sm btn-outline-primary">
					    Read More
					</a>

                    <!-- Author -->
                    <small class="text-muted"
                           th:text="${post.user != null ? post.user.name : 'Unknown'}">
                    </small>

                </div>

            </div>

        </div>

    </div>

</section>

</body>
</html>
