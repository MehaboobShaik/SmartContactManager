<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="Layout(content)">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title th:text="${title}">Blog App</title>

	<!-- Bootstrap -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">

	<!-- FontAwesome -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">

	<link rel="stylesheet" th:href="@{/css/style.css}" />
	<link rel="stylesheet" th:href="@{/css/add_post.css}">
</head>

<body>

	<!-- NAVBAR -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
		<a class="navbar-brand" th:href="@{/}">
			Smart Contact Manager
		</a>

		<ul class="navbar-nav ml-auto text-uppercase">
			<li class="nav-item">
				<a class="nav-link" th:href="@{/}">Home</a>
			</li>

			<li class="nav-item">
				<a class="nav-link">
					<i class="fa-solid fa-user"></i>
					<span th:text="${user.name}">Profile</span>
				</a>
			</li>

			<li class="nav-item">
				<a class="nav-link" th:href="@{/logout}">
					<i class="fa-solid fa-right-from-bracket"></i> Logout
				</a>
			</li>
		</ul>
	</nav>

	<!-- CONTENT -->
	<div class="content">
		<div th:replace="${content}"></div>
	</div>

	<!-- JS LIBS -->
	<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>

	<!-- ✅ SweetAlert2 ONLY -->
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

	<!-- ✅ GLOBAL JS -->
	<script>

		function toggleCategoryBox() {
			const box = document.getElementById("newCategoryBox");
			box.style.display =
				box.style.display === "none" ? "block" : "none";
		}

		function saveCategory() {

			const title = document.getElementById("newCategoryTitle").value;
			const description = document.getElementById("newCategoryDesc").value;

			if (!title || !description) {
				Swal.fire({
					title: 'Oops!',
					text: 'Please fill all fields',
					icon: 'warning'
				});
				return;
			}

			fetch("/category/save", {
				method: "POST",
				headers: {
					"Content-Type": "application/x-www-form-urlencoded"
				},
				body: "title=" + encodeURIComponent(title)
					+ "&description=" + encodeURIComponent(description)
			})
				.then(response => response.json())
				.then(data => {

					const select = document.getElementById("categorySelect");

					const option = document.createElement("option");
					option.value = data.categoryId;
					option.text = data.categoryTitle;

					select.add(option);
					select.value = data.categoryId;

					// ✅ SUCCESS POPUP
					Swal.fire({
						title: '🎉 Category Added!',
						text: data.categoryTitle + ' created successfully',
						icon: 'success',
						timer: 2000,
						showConfirmButton: false
					});

					// clear fields
					document.getElementById("newCategoryTitle").value = "";
					document.getElementById("newCategoryDesc").value = "";

					document.getElementById("newCategoryBox").style.display = "none";
				})
				.catch(error => {
					console.error(error);

					Swal.fire({
						title: 'Error!',
						text: 'Something went wrong',
						icon: 'error'
					});
				});
		}

		// ✅ DELETE (UPDATED TO SWEETALERT2)
		function deleteContact(cid) {

			Swal.fire({
				title: "Are you sure?",
				text: "This action cannot be undone!",
				icon: "warning",
				showCancelButton: true,
				confirmButtonColor: "#d33",
				confirmButtonText: "Yes, delete it!"
			}).then((result) => {
				if (result.isConfirmed) {
					window.location = "/user/delete/" + cid;
				}
			});
		}

	</script>

	<script th:src="@{/js/script.js}"></script>
	<script th:src="@{/js/add_post.js}"></script>

</body>

</html>
